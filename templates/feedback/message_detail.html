{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'feedback:message_list' %}">Все сообщения</a></li>
            <li class="breadcrumb-item active">Сообщение #{{ message.id }}</li>
        </ol>
    </nav>
    
    <!-- Контейнер для динамической загрузки через AJAX -->
    <div id="message-detail-container" data-message-id="{{ message.id }}">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Загрузка...</span>
            </div>
        </div>
    </div>
    
    <!-- Форма ответа (статическая, но отправляется через AJAX) -->
    <div class="card mt-4">
        <div class="card-header bg-light">
            <h5 class="mb-0">Ответить на сообщение</h5>
        </div>
        <div class="card-body">
            <form id="reply-form" method="post" action="{% url 'feedback:reply_to_message' message.id %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_reply_text" class="form-label">Ваш ответ</label>
                    {{ reply_form.reply_text }}
                </div>
                <button type="submit" class="btn btn-primary">Отправить ответ</button>
            </form>
        </div>
    </div>
</div>

<!-- Подключение JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/feedback.js"></script>
{% endblock %}
